target-version = "py39"
line-length = 110

[lint]
select = ["E", "F", "I", "B", "W"]
ignore = [
    "E501",   # comprimento de linha — confiamos no formatter
    "B008",   # FastAPI usa Depends() em defaults — padrão idiomático
    "E741",   # nomes ambíguos `l`, `i` em comprehensions de teste
]

[lint.per-file-ignores]
"tests/*" = ["B017", "F841"]  # F841: testes podem capturar valor sem usar
